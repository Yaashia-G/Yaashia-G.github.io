# Site settings
title: blank
first_name: Yaashia
middle_name: 
last_name: Gautam
email: yaashia.gautam@colorado.edu
description: > 
  A simple, whitespace theme for academics
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: jekyll, academics, portfolio  # Add your keywords here

lang: en
icon: ⚛️  # the emoji used as the favicon
url: https://yaashia-g.github.io
baseurl: 
last_updated: false
impressum_path: 

# Layout config
navbar_fixed: true
footer_fixed: true
max_width: 800px

# Open Graph & Schema.org
serve_og_meta: false
serve_schema_org: false

# Collections
collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

news_scrollable: true
news_limit: 5

# Jekyll scholar
scholar:
  style: apa
  locale: en
  sort_by: year
  order: descending
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details
  query: "@*"
